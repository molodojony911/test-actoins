# Сборка Docker-образа → GitHub Container Registry (GHCR), затем деплой по SSH.
#
# Секреты и переменные (Settings → Secrets and variables → Actions):
#   SSH_HOST           — хост (секрет или Variables → SSH_HOST)
#   SSH_USER           — пользователь SSH: надёжнее задать как Variable (не секрет), см. шаг ниже
#   SSH_PRIVATE_KEY    — приватный ключ (весь PEM, с BEGIN/END)
#   (при SSH не на порту 22 добавьте в шаг appleboy параметр port: ${{ secrets.SSH_PORT }})
#   GHCR_USERNAME      — логин GitHub для docker login на сервере (часто тот же, что владелец PAT)
#   GHCR_PULL_TOKEN    — PAT с правом read:packages (и при приватном образе — read на репозиторий пакета)
#
# Логи в Loki (передаются в docker run на сервере):
#   Variables: LOKI_URL — URL push API для контейнера приложения. Типично:
#             • Loki слушает порт на СЕРВЕРЕ (docker -p 3100:3100 или бинарь на хосте):
#               LOKI_URL=http://host.docker.internal:3100
#               (в скрипте добавлен --add-host=host.docker.internal:host-gateway — Linux Docker 20.10+)
#             • Loki в той же Docker-сети, что и приложение: Variable DEPLOY_DOCKER_NETWORK = имя сети
#               (см. docker network ls), LOKI_URL=http://<имя_контейнера_loki>:3100
#             Опционально: LOKI_APP_LABEL, LOKI_ENV
#   Secrets (опц.): LOKI_ORG_ID, LOKI_BASIC_AUTH_USER, LOKI_BASIC_AUTH_PASSWORD
#
# Пакет GHCR должен быть доступен этому пользователю (public пакет или выдан доступ).

name: Build, push to GHCR, deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Имя контейнера на сервере и порт приложения (как в Dockerfile)
  DEPLOY_CONTAINER_NAME: test-gitact
  APP_PORT: "8000"

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.lowercase }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name (GHCR)
        id: image
        run: |
          echo "lowercase=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.lowercase }}:latest
            ${{ steps.image.outputs.lowercase }}:${{ github.sha }}

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # Имя пользователя SSH: GitHub Variables (SSH_USER) подставляются явно; секрет SSH_USER — запасной вариант.
      # Если drone-ssh пишет "username is empty", в этом репозитории нет Variable/Secret с непустым значением.
      - name: Check deploy credentials
        env:
          SSH_HOST_VAL: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          SSH_USER_VAL: ${{ vars.SSH_USER || secrets.SSH_USER }}
          GHCR_USER_VAL: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN_VAL: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          missing=0
          if [ -z "${SSH_HOST_VAL}" ]; then echo "::error::Не задан SSH_HOST (Variable или Secret)"; missing=1; fi
          if [ -z "${SSH_USER_VAL}" ]; then echo "::error::Не задан SSH_USER (рекомендуется Variable: Settings → Variables → SSH_USER)"; missing=1; fi
          if [ -z "${GHCR_USER_VAL}" ]; then echo "::error::Не задан Secret GHCR_USERNAME"; missing=1; fi
          if [ -z "${GHCR_TOKEN_VAL}" ]; then echo "::error::Не задан Secret GHCR_PULL_TOKEN"; missing=1; fi
          exit "$missing"

      # Ключ через файл: многострочный PEM в секрете не «схлопывается», как иногда бывает с key: в YAML.
      - name: Write SSH private key
        run: |
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/gha_deploy_key"
          chmod 600 "$RUNNER_TEMP/gha_deploy_key"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST || secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER || secrets.SSH_USER }}
          key_path: ${{ runner.temp }}/gha_deploy_key
          # По умолчанию 10m — часто не хватает на docker pull с GHCR при медленном канале.
          command_timeout: 30m
          script: |
            set -e
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "${{ needs.build-and-push.outputs.image }}:latest"
            docker stop "${{ env.DEPLOY_CONTAINER_NAME }}" 2>/dev/null || true
            docker rm "${{ env.DEPLOY_CONTAINER_NAME }}" 2>/dev/null || true
            NET=""
            if [ -n "${{ vars.DEPLOY_DOCKER_NETWORK }}" ]; then
              NET="--network ${{ vars.DEPLOY_DOCKER_NETWORK }}"
            fi
            docker run -d \
              --name "${{ env.DEPLOY_CONTAINER_NAME }}" \
              --restart unless-stopped \
              ${NET} \
              --add-host=host.docker.internal:host-gateway \
              -p "${{ env.APP_PORT }}:${{ env.APP_PORT }}" \
              -e LOKI_URL="${{ vars.LOKI_URL }}" \
              -e LOKI_APP_LABEL="${{ vars.LOKI_APP_LABEL }}" \
              -e LOKI_ENV="${{ vars.LOKI_ENV }}" \
              -e LOKI_ORG_ID="${{ secrets.LOKI_ORG_ID }}" \
              -e LOKI_BASIC_AUTH_USER="${{ secrets.LOKI_BASIC_AUTH_USER }}" \
              -e LOKI_BASIC_AUTH_PASSWORD="${{ secrets.LOKI_BASIC_AUTH_PASSWORD }}" \
              "${{ needs.build-and-push.outputs.image }}:latest"
